<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Üretici</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 15px;
        }
        input, button, select {
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }
        button {
            background: #ff6b6b;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #ff5252;
        }
        .sifre {
            font-size: 24px;
            background: white;
            color: black;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Şifre Üretici</h1>
        
        <label>Uzunluk: </label>
        <input type="number" id="uzunluk" value="12" min="6" max="30"><br>
        
        <input type="checkbox" id="buyuk" checked> Büyük Harf<br>
        <input type="checkbox" id="kucuk" checked> Küçük Harf<br>
        <input type="checkbox" id="sayi" checked> Sayı<br>
        <input type="checkbox" id="sembol" checked> Özel Karakter<br><br>
        
        <button onclick="sifreUret()">Şifre Üret</button>
        
        <div class="sifre" id="sonuc"></div>
        
        <button onclick="kopyala()">📋 Kopyala</button>
    </div>

    <script>
        function sifreUret() {
            const uzunluk = document.getElementById("uzunluk").value;
            const buyuk = document.getElementById("buyuk").checked;
            const kucuk = document.getElementById("kucuk").checked;
            const sayi = document.getElementById("sayi").checked;
            const sembol = document.getElementById("sembol").checked;
            
            let karakterler = "";
            if (buyuk) karakterler += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if (kucuk) karakterler += "abcdefghijklmnopqrstuvwxyz";
            if (sayi) karakterler += "0123456789";
            if (sembol) karakterler += "!@#$%^&*()_+-=[]{}|;:,.<>?";
            
            let sifre = "";
            for (let i = 0; i < uzunluk; i++) {
                sifre += karakterler.charAt(Math.floor(Math.random() * karakterler.length));
            }
            
            document.getElementById("sonuc").innerHTML = sifre;
        }

        function kopyala() {
            const sifre = document.getElementById("sonuc").innerHTML;
            if (sifre) {
                navigator.clipboard.writeText(sifre);
                alert("Şifre kopyalandı! ✅");
            }
        }
    </script>
</body>
</html>
